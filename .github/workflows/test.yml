name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          shellcheck scripts/cr scripts/cr-* scripts/critical-research-hook || true

  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bash syntax check all scripts
        run: |
          for f in scripts/*; do
            [ -f "$f" ] || continue
            head -1 "$f" | grep -q '#!/bin/bash\|#!/usr/bin/env bash' || continue
            bash -n "$f" || { echo "FAIL: $f"; exit 1; }
          done
          echo "All scripts pass syntax check"

  schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON schemas
        run: |
          for f in schemas/*.json; do
            python3 -m json.tool "$f" > /dev/null || { echo "INVALID JSON: $f"; exit 1; }
          done
          echo "All JSON schemas valid"

  happy-path:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get install -y jq
          sudo wget -O /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Run happy-path test
        run: |
          export PATH="$PWD/scripts:$PATH"
          bash tests/test-paper-round-happy-path.sh

  yaml-templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yq
        run: |
          sudo wget -O /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Validate YAML templates
        run: |
          for f in templates/*.yaml templates/*.yml; do
            [ -f "$f" ] || continue
            yq -e . "$f" > /dev/null || { echo "INVALID YAML: $f"; exit 1; }
          done
          echo "All YAML templates valid"
