          sudo chmod +x /usr/local/bin/yq
      - name: Run close-round protocol test
        run: |
          export PATH="$PWD/scripts:$PATH"
          export CR_SKILL_HOME="$PWD"
          bash tests/test-close-round-protocol.sh

  hook-contract:
