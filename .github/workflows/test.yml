name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          shellcheck scripts/cr scripts/cr-* scripts/critical-research-hook scripts/cr-resolve-artifact-path scripts/cr-start-paper-round scripts/cr-validate-module-checkpoint scripts/cr-validate-module-review scripts/cr-validate-phase-run-log scripts/cr-hook-user-prompt-expansion scripts/cr-hook-config-change

  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bash syntax check all scripts
        run: |
          for f in scripts/*; do
            [ -f "$f" ] || continue
            head -1 "$f" | grep -q '#!/bin/bash\|#!/usr/bin/env bash' || continue
            bash -n "$f" || { echo "FAIL: $f"; exit 1; }
          done
          echo "All scripts pass syntax check"

  schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON schemas
        run: |
          for f in schemas/*.json; do
            python3 -m json.tool "$f" > /dev/null || { echo "INVALID JSON: $f"; exit 1; }
          done
          echo "All JSON schemas valid"

  happy-path:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get install -y jq
          sudo wget -O /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Run happy-path test
        run: |
          export PATH="$PWD/scripts:$PATH"
          bash tests/test-full-round-enforcement.sh

  37-phase-happy-path:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get install -y jq
          sudo wget -O /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Run 37-phase state machine happy path
        run: |
          export PATH="$PWD/scripts:$PATH"
          export CR_SKILL_HOME="$PWD"
          bash tests/test-37-phase-state-machine-happy-path.sh

  slash-command-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run slash command contract test
        run: |
          export PATH="$PWD/scripts:$PATH"
          bash tests/test-slash-command-contract.sh

  phase-run-log-io:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get install -y jq
          sudo wget -O /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Run phase-run-log required IO test
        run: |
          export PATH="$PWD/scripts:$PATH"
          export CR_SKILL_HOME="$PWD"
          bash tests/test-phase-run-log-required-io.sh

  module-checkpoint:
