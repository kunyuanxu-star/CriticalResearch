          export CR_SKILL_HOME="$PWD"
          bash tests/test-scoped-run-log-io.sh

  stop-gate-run-log-mismatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get install -y jq
