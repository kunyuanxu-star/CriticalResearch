  scoped-run-log-io:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get install -y jq
          sudo wget -O /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Run scoped run-log IO test
        run: |
          export PATH="$PWD/scripts:$PATH"
          export CR_SKILL_HOME="$PWD"
          bash tests/test-scoped-run-log-io.sh

  stop-gate-run-log-mismatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get install -y jq
          sudo wget -O /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Run stop gate run-log mismatch test
        run: |
          export PATH="$PWD/scripts:$PATH"
          export CR_SKILL_HOME="$PWD"
          bash tests/test-stop-gate-run-log-mismatch.sh

  review-structural-vs-semantic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get install -y jq
          sudo wget -O /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Run structural vs semantic review test
        run: |
          export PATH="$PWD/scripts:$PATH"
          export CR_SKILL_HOME="$PWD"
          bash tests/test-review-structural-vs-semantic.sh

  release-gate:
    runs-on: ubuntu-latest
    needs:
      - shellcheck
      - syntax
      - schemas
      - happy-path
      - 37-phase-happy-path
      - slash-command-contract
      - phase-run-log-io
      - module-checkpoint
      - close-round-protocol
      - hook-contract
      - module-review-gate
      - user-prompt-expansion
      - config-change-blocks
      - directory-hash-proof
      - no-bare-hash-key
      - scoped-run-log-io
      - stop-gate-run-log-mismatch
      - review-structural-vs-semantic
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get install -y jq
          sudo wget -O /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Run release gate
        run: |
          export PATH="$PWD/scripts:$PATH"
          export CR_SKILL_HOME="$PWD"
          bash tests/test-release-gate.sh

  yaml-templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yq
        run: |
          sudo wget -O /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Validate YAML templates
        run: |
          for f in templates/*.yaml templates/*.yml; do
            [ -f "$f" ] || continue
            yq -e . "$f" > /dev/null || { echo "INVALID YAML: $f"; exit 1; }
          done
          echo "All YAML templates valid"

  enforce-hooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify hook config in settings.json
        run: |
          echo "Checking .claude/settings.json for all 6 hook events..."
          for event in UserPromptExpansion UserPromptSubmit PreToolUse PostToolUse Stop ConfigChange; do
            grep -q "\"$event\"" .claude/settings.json || {
              echo "FAIL: Hook $event missing from .claude/settings.json"
              exit 1
            }
            echo "  OK: $event"
          done
          echo "All hook events configured."

      - name: Verify no disableAllHooks in committed files
        run: |
          echo "Checking for disableAllHooks:true in tracked files..."
          if grep -r '"disableAllHooks"\s*:\s*true' . --include="*.json" 2>/dev/null; then
            echo "FAIL: disableAllHooks:true found in committed files"
            exit 1
          fi
          echo "  OK: No disableAllHooks:true found."

      - name: Verify hook wrapper dispatch is correct
        run: |
          echo "Checking critical-research-hook dispatch..."
          for event in user-prompt-expansion user-prompt-submit pre-tool-use post-tool-use stop config-change; do
            script_name="cr-hook-${event}"
            grep -q "$script_name" scripts/critical-research-hook || {
              echo "FAIL: $script_name not dispatched in critical-research-hook"
              exit 1
            }
            echo "  OK: $event -> $script_name"
          done

      - name: Verify pre-commit hook passes syntax check
        run: |
          if [ -f hooks/pre-commit ]; then
            bash -n hooks/pre-commit || { echo "FAIL: hooks/pre-commit syntax error"; exit 1; }
            echo "  OK: hooks/pre-commit passes bash -n"
          else
            echo "  WARN: hooks/pre-commit not found (should be created)"
          fi
