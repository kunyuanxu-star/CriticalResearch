# Human Review Queue
# Thesis-level patches and blocking questions awaiting user decision.
# Each entry is resolved before the round can close (paper mode).

decisions:
  - decision_id: DEC-XXX
    linked_patch_id: PP-XXX
    linked_question_id: ""      # optional
    decision: accepted          # accepted | accepted_with_modifications | rejected | deferred | needs_more_evidence
    rationale: "User's reasoning for this decision."
    chosen_option: ""
    knowledge_delta:
      generates_rule: false
      rule_candidate: ""
      rule_category: ""
    blocks_round_close: true
    timestamp: ""
    resolved_at: ""
