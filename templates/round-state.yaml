    depends_on: []
    required_inputs:
      - writing/paper-draft.md
      - state/claim-ledger.yaml
    required_outputs:
      - paper-state.yaml
    allowed_actions:
      - read_draft
      - read_claim_ledger
      - write_paper_state
    forbidden_actions:
      - external_research
      - write_paper_patch
      - edit_draft
      - generate_critique
    no_op_policy:
      allowed: false
      required_justification_fields: []
    completion_predicate:
      all_outputs_exist: true
      validator_passed: true
      no_unresolved_blockers: true
