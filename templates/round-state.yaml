schema_version: "2.0.0"
project_id: ""
round_id: 0
workflow_mode: paper
status: open
current_phase: reconstruct_paper_state

required_research: true
required_min_sources: 5
required_source_levels:
  min_s_or_a: 2
  allow_b: true
  allow_c_only_as_lead: true

phase_order:
  - reconstruct_paper_state
  - define_round_target
  - plan_research
  - run_retrieval
  - ingest_sources
  - normalize_evidence
  - update_literature_knowledge
  - adversarial_critique
  - generate_dispositions
  - generate_paper_patches
  - generate_experiment_obligations
  - apply_patches_to_draft
  - distill_knowledge
  - close_round

phases:
  reconstruct_paper_state:
    status: open
    started_at: null
    completed_at: null
    depends_on: []
    required_inputs:
      - writing/paper-draft.md
      - state/claim-ledger.yaml
    required_outputs:
      - paper-state.yaml
      - loaded-knowledge.yaml
    phase_validators_hint:
      - cr-validate-schema

  define_round_target:
    status: blocked
    started_at: null
    completed_at: null
    depends_on:
      - reconstruct_paper_state
    required_outputs:
      - round-target.yaml

  plan_research:
    status: blocked
    started_at: null
    completed_at: null
    depends_on:
      - define_round_target
    required_outputs:
      - research-plan.yaml
      - search-queue.yaml

    required_inputs:
      - round-target.yaml
      - state/claim-ledger.yaml
    phase_validators_hint:
      - cr-validate-research
  run_retrieval:
    status: blocked
    started_at: null
    completed_at: null
    depends_on:
      - plan_research
    required_outputs:
      - search-log.yaml
      - raw-sources

  ingest_sources:
    status: blocked
    started_at: null
    completed_at: null
    depends_on:
      - run_retrieval
    required_outputs:
      - source-index.yaml

    required_inputs:
      - raw-sources
    phase_validators_hint:
      - cr-validate-source-integrity
  normalize_evidence:
    status: blocked
    started_at: null
    completed_at: null
    depends_on:
      - ingest_sources
    required_outputs:
      - evidence-ledger.yaml

  update_literature_knowledge:
    status: blocked
    started_at: null
    completed_at: null
    depends_on:
      - normalize_evidence
    required_outputs:
      - literature-delta.yaml

    required_inputs:
      - evidence-ledger.yaml
    phase_validators_hint:
      []
  adversarial_critique:
    status: blocked
    started_at: null
    completed_at: null
    depends_on:
      - normalize_evidence
    required_outputs:
      - critique-ledger.yaml

  generate_dispositions:
    status: blocked
    started_at: null
    completed_at: null
    depends_on:
      - adversarial_critique
    required_outputs:
      - dispositions.yaml

    required_inputs:
      - critique-ledger.yaml
    phase_validators_hint:
      []
  generate_paper_patches:
    status: blocked
    started_at: null
    completed_at: null
    depends_on:
      - generate_dispositions
    required_outputs:
      - patches

  generate_experiment_obligations:
    status: blocked
    started_at: null
    completed_at: null
    depends_on:
      - generate_paper_patches
    required_outputs:
      - experiment-obligations.yaml

    required_inputs:
      - patches
    phase_validators_hint:
      - cr-validate-experiments
  apply_patches_to_draft:
    status: blocked
    started_at: null
    completed_at: null
    depends_on:
      - generate_paper_patches
    required_outputs:
      - writing-diff.yaml

  distill_knowledge:
    status: blocked
    started_at: null
    completed_at: null
    depends_on:
      - apply_patches_to_draft
      - generate_experiment_obligations
    required_outputs:
      - knowledge-delta.yaml
      - knowledge-apply-log.yaml

    required_inputs:
      - patches
      - evidence-ledger.yaml
      - writing-diff.yaml
    phase_validators_hint:
      []
  close_round:
    status: blocked
    started_at: null
    completed_at: null
    depends_on:
      - distill_knowledge
    required_outputs:
      - closure-report.yaml

closure_policy:
  require_all_phases_complete: true
  require_external_research: true
  require_evidence_for_each_core_claim: true
  require_patch_for_medium_plus_critique: true
  require_experiment_for_claim_patch: true
  require_draft_diff_for_applied_patch: true
  require_no_pending_human_decisions: true
