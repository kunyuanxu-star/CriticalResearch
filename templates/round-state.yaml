schema_version: "4.0.0"
project_id: ""
round_id: 0
workflow_mode: paper
status: open
document_target: paper
document_type: paper
current_stage: s1_round_contract

required_research: true
required_min_sources: 5
required_source_levels:
  min_s_or_a: 2
  allow_b: true
  allow_c_only_as_lead: true

execution_policy:
  invocation_mode: slash_command
  full_round_required: true
  full_paper_required: true
  required_stage_count: 8
  allow_partial_stop: false
  stop_only_on:
    - round_closed
    - human_decision_required
    - unrecoverable_tool_error

stage_order:
  - s1_round_contract
  - s2_evidence_grounding
  - s3_critical_review
  - s4_revision_strategy
  - s5_writing_strategy
  - s6_paper_patch
  - s7_knowledge_consolidation
  - s8_round_closure

stages:
  s1_round_contract:
    status: open
    started_at: null
    completed_at: null
    prompt: prompts/stages/s1_round_contract.md
    prompt_hash: null
    depends_on: []
    required_inputs:
      - writing/paper-draft.md
      - state/claim-ledger.yaml
    required_outputs:
      - round-contract.yaml
    allowed_actions:
      - read_draft
      - read_claim_ledger
      - write_round_contract
    forbidden_actions:
      - external_research
      - write_paper_patch
      - edit_draft
      - generate_critique
    no_op_policy:
      allowed: false
      required_justification_fields: []
    completion_predicate:
      all_outputs_exist: true
      validator_passed: true
      no_unresolved_blockers: true
    stage_validators_hint:
      - cr-validate-schema

  s2_evidence_grounding:
    status: blocked
    started_at: null
    completed_at: null
    prompt: prompts/stages/s2_evidence_grounding.md
    prompt_hash: null
    depends_on:
      - s1_round_contract
    required_inputs:
      - round-contract.yaml
      - writing/paper-draft.md
      - state/claim-ledger.yaml
    required_outputs:
      - evidence-ledger.yaml
      - claim-evidence-map.yaml
      - search-log.yaml
      - raw-sources/
    allowed_actions:
      - execute_search
      - save_raw_source
      - write_evidence_ledger
      - write_claim_evidence_map
    forbidden_actions:
      - generate_critique
      - edit_draft
      - generate_patch
      - write_paper_patch
    no_op_policy:
      allowed: false
      required_justification_fields: []
    completion_predicate:
      all_outputs_exist: true
      validator_passed: true
      no_unresolved_blockers: true
    stage_validators_hint:
      - cr-validate-evidence-claim-links

  s3_critical_review:
    status: blocked
    started_at: null
    completed_at: null
    prompt: prompts/stages/s3_critical_review.md
    prompt_hash: null
    depends_on:
      - s2_evidence_grounding
    required_inputs:
      - evidence-ledger.yaml
      - claim-evidence-map.yaml
      - writing/paper-draft.md
      - round-contract.yaml
    required_outputs:
      - critique-ledger.yaml
      - review-disposition.yaml
    allowed_actions:
      - read_evidence_ledger
      - read_claim_evidence_map
      - read_paper_draft
      - write_critique_ledger
      - write_review_disposition
    forbidden_actions:
      - edit_draft
      - generate_patch
      - apply_patch
    no_op_policy:
      allowed: false
      required_justification_fields: []
    completion_predicate:
      all_outputs_exist: true
      validator_passed: true
      no_unresolved_blockers: true
    stage_validators_hint:
      - cr-validate-critique

  s4_revision_strategy:
    status: blocked
    started_at: null
    completed_at: null
    prompt: prompts/stages/s4_revision_strategy.md
    prompt_hash: null
    depends_on:
      - s3_critical_review
    required_inputs:
      - critique-ledger.yaml
      - review-disposition.yaml
    required_outputs:
      - revision-plan.yaml
    allowed_actions:
      - read_critique_ledger
      - read_review_disposition
      - write_revision_plan
    forbidden_actions:
      - edit_draft
      - generate_patch
      - apply_patch
    no_op_policy:
      allowed: true
      required_justification_fields:
        - no_revision_needed_reason
        - dispositions_reviewed
      artifact_path: revision-plan.yaml
    completion_predicate:
      all_outputs_exist: true
      validator_passed: true
      no_unresolved_blockers: true
    stage_validators_hint: []

  s5_writing_strategy:
    status: blocked
    started_at: null
    completed_at: null
    prompt: prompts/stages/s5_writing_strategy.md
    prompt_hash: null
    depends_on:
      - s4_revision_strategy
    required_inputs:
      - revision-plan.yaml
      - writing/paper-draft.md
    required_outputs:
      - writing-plan.yaml
      - patch-plan.yaml
    allowed_actions:
      - read_revision_plan
      - read_paper_draft
      - write_writing_plan
      - write_patch_plan
    forbidden_actions:
      - edit_draft
      - apply_patch
    no_op_policy:
      allowed: true
      required_justification_fields:
        - no_writing_change_reason
        - revision_plan_reviewed
      artifact_path: writing-plan.yaml
    completion_predicate:
      all_outputs_exist: true
      validator_passed: true
      no_unresolved_blockers: true
    stage_validators_hint: []

  s6_paper_patch:
    status: blocked
    started_at: null
    completed_at: null
    prompt: prompts/stages/s6_paper_patch.md
    prompt_hash: null
    depends_on:
      - s5_writing_strategy
    required_inputs:
      - patch-plan.yaml
      - writing-plan.yaml
      - writing/paper-draft.md
    required_outputs:
      - writing/paper-draft.md
      - writing-diff.yaml
      - patch-trace.yaml
      - experiment-obligations.yaml
    allowed_actions:
      - read_patch_plan
      - read_writing_plan
      - edit_draft
      - write_writing_diff
      - write_patch_trace
      - write_experiment_obligations
    forbidden_actions:
      - add_new_evidence
      - change_unpatched_sections
      - generate_critique
    no_op_policy:
      allowed: true
      required_justification_fields:
        - no_patches_to_apply_reason
        - patch_plan_reviewed
      artifact_path: writing-diff.yaml
    completion_predicate:
      all_outputs_exist: true
      validator_passed: true
      no_unresolved_blockers: true
    stage_validators_hint:
      - cr-validate-patch-application

  s7_knowledge_consolidation:
    status: blocked
    started_at: null
    completed_at: null
    prompt: prompts/stages/s7_knowledge_consolidation.md
    prompt_hash: null
    depends_on:
      - s6_paper_patch
    required_inputs:
      - critique-ledger.yaml
      - patch-trace.yaml
      - evidence-ledger.yaml
    required_outputs:
      - knowledge-delta.yaml
      - knowledge-apply-log.yaml
    allowed_actions:
      - read_critique_ledger
      - read_patch_trace
      - read_evidence_ledger
      - write_knowledge_delta
      - write_knowledge_apply_log
      - write_to_knowledge_base
    forbidden_actions:
      - edit_draft
      - generate_patch
      - modify_claim_ledger
    no_op_policy:
      allowed: true
      required_justification_fields:
        - no_knowledge_delta_reason
        - deltas_reviewed
      artifact_path: knowledge-delta.yaml
    completion_predicate:
      all_outputs_exist: true
      validator_passed: true
      no_unresolved_blockers: true
    stage_validators_hint:
      - cr-validate-knowledge

  s8_round_closure:
    status: blocked
    started_at: null
    completed_at: null
    prompt: prompts/stages/s8_round_closure.md
    prompt_hash: null
    depends_on:
      - s7_knowledge_consolidation
    required_outputs:
      - next-round-targets.yaml
      - round-summary.yaml
    allowed_actions:
      - read_all_artifacts
      - write_next_round_targets
      - write_round_summary
    forbidden_actions:
      - edit_draft
      - generate_patch
      - modify_artifacts
    no_op_policy:
      allowed: false
      required_justification_fields: []
    completion_predicate:
      all_outputs_exist: true
      validator_passed: true
      no_unresolved_blockers: true
    stage_validators_hint:
      - cr-run-validator-pipeline

closure_policy:
  require_all_stages_complete: true
  require_exact_stage_count: 8
  require_no_skipped_stages: true
  require_external_research: true
  require_no_pending_human_decisions: true
  require_transaction_chain_complete: true
  require_patch_for_medium_plus_critique: true
  require_experiment_for_claim_patch: true
  require_draft_diff_for_applied_patch: true
  require_knowledge_writeback: true
  close_round_is_stage: true
  require_stage_run_log: true
