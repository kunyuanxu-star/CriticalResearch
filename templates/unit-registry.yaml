# Unit Registry
# Defines modifiable units within a document, demarcated by HTML comment anchors.

schema_version: "1.0.0"
document_id: <DOCUMENT_ID>
document_path: documents/<DOCUMENT_ID>.md

units:
  - unit_id: <DOCUMENT_ID>.<UNIT_NAME>
    title: "<UNIT_TITLE>"
    anchors:
      start: "<!-- unit:<DOCUMENT_ID>.<UNIT_NAME>:start -->"
      end: "<!-- unit:<DOCUMENT_ID>.<UNIT_NAME>:end -->"
    unit_type: <UNIT_TYPE>
    status: active
