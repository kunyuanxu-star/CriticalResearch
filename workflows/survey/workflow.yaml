# Survey Workflow — CriticalResearch v2
# Purpose: Modify survey documents — related work sections, taxonomies,
# gap analyses, comparison matrices.

schema_version: "1.0.0"
workflow_id: survey
target_document_types:
  - survey

stage_order:
  - contract
  - survey_state
  - research_planning
  - source_analysis
  - taxonomy_synthesis
  - critical_review
  - revision_plan
  - apply_survey_patch
  - knowledge_delta
  - closure

prompt_pack:
  contract: workflows/survey/prompts/01-contract.md
  survey_state: workflows/survey/prompts/02-survey-state.md
  research_planning: workflows/survey/prompts/03-research-planning.md
  source_analysis: workflows/survey/prompts/04-source-analysis.md
  taxonomy_synthesis: workflows/survey/prompts/05-taxonomy-synthesis.md
  critical_review: workflows/survey/prompts/06-critical-review.md
  revision_plan: workflows/survey/prompts/07-revision-plan.md
  apply_survey_patch: workflows/survey/prompts/08-apply-survey-patch.md
  knowledge_delta: workflows/survey/prompts/09-knowledge-delta.md
  closure: workflows/survey/prompts/10-closure.md
stage_contracts:
  contract:
    prompt: workflows/survey/prompts/01-contract.md
    required_inputs:
      - project.yaml
      - documents/registry.yaml
    required_outputs:
      - contract.yaml
    allowed_writes:
      - contract.yaml
    validators:
      - cr-validate-round-contract
  survey_state:
    prompt: workflows/survey/prompts/02-survey-state.md
    required_inputs:
      - contract.yaml
    required_outputs:
      - survey-state.yaml
    allowed_writes:
      - survey-state.yaml
    validators: []
  research_planning:
    prompt: workflows/survey/prompts/03-research-planning.md
    required_inputs:
      - contract.yaml
      - survey-state.yaml
    required_outputs:
      - research-plan.yaml
      - source-hunting-plan.yaml
      - critical-search-plan.yaml
      - venue-norm-research-plan.yaml
      - writing-pattern-research-plan.yaml
    allowed_writes:
      - research-plan.yaml
      - source-hunting-plan.yaml
      - critical-search-plan.yaml
      - venue-norm-research-plan.yaml
      - writing-pattern-research-plan.yaml
    validators: []
  source_analysis:
    prompt: workflows/survey/prompts/04-source-analysis.md
    required_inputs:
      - research-plan.yaml
      - survey-state.yaml
    required_outputs:
      - source-index.yaml
      - evidence-ledger.yaml
      - source-analysis-matrix.yaml
      - taxonomy-impact.yaml
      - dangerous-baselines.yaml
    allowed_writes:
      - source-index.yaml
      - evidence-ledger.yaml
      - source-notes.md
      - source-analysis-matrix.yaml
      - taxonomy-impact.yaml
      - dangerous-baselines.yaml
    validators: []
  taxonomy_synthesis:
    prompt: workflows/survey/prompts/05-taxonomy-synthesis.md
    required_inputs:
      - evidence-ledger.yaml
      - source-analysis-matrix.yaml
      - taxonomy-impact.yaml
      - dangerous-baselines.yaml
      - survey-state.yaml
    required_outputs:
      - taxonomy-update.yaml
      - comparison-matrix.yaml
      - gap-analysis-update.yaml
      - taxonomy-risks.yaml
    allowed_writes:
      - taxonomy-update.yaml
      - comparison-matrix.yaml
      - gap-analysis-update.yaml
      - taxonomy-rationale.md
      - taxonomy-risks.yaml
    validators: []
  critical_review:
    prompt: workflows/survey/prompts/06-critical-review.md
    required_inputs:
      - taxonomy-update.yaml
      - comparison-matrix.yaml
      - gap-analysis-update.yaml
      - evidence-ledger.yaml
      - dangerous-baselines.yaml
      - survey-state.yaml
    required_outputs:
      - critical-review.yaml
      - review-disposition.yaml
      - coverage-risk.yaml
      - taxonomy-risks.yaml
    allowed_writes:
      - critical-review.yaml
      - review-disposition.yaml
      - coverage-risk.yaml
      - taxonomy-attack-report.md
    validators: []
  revision_plan:
    prompt: workflows/survey/prompts/07-revision-plan.md
    required_inputs:
      - critical-review.yaml
      - review-disposition.yaml
      - taxonomy-update.yaml
      - comparison-matrix.yaml
      - gap-analysis-update.yaml
      - evidence-ledger.yaml
      - dangerous-baselines.yaml
      - contract.yaml
    required_outputs:
      - revision-plan.yaml
      - patch-plan.yaml
      - coverage-risk.yaml
      - deferred-obligations.yaml
      - no-patch-rationale.yaml
      - taxonomy-risks.yaml
    allowed_writes:
      - revision-plan.yaml
      - patch-plan.yaml
      - deferred-obligations.yaml
      - no-patch-rationale.yaml
    validators: []
  apply_survey_patch:
    prompt: workflows/survey/prompts/08-apply-survey-patch.md
    required_inputs:
      - revision-plan.yaml
      - critical-review.yaml
      - taxonomy-update.yaml
      - comparison-matrix.yaml
      - gap-analysis-update.yaml
      - evidence-ledger.yaml
      - dangerous-baselines.yaml
      - contract.yaml
    required_outputs:
      - patch-trace.yaml
      - document-diff.yaml
      - deferred-obligations.yaml
      - no-patch-rationale.yaml
      - residual-risks.yaml
    allowed_writes:
      - patch-trace.yaml
      - document-diff.yaml
      - applied-patch-summary.md
      - residual-risks.yaml
    validators: []
  knowledge_delta:
    prompt: workflows/survey/prompts/09-knowledge-delta.md
    required_inputs:
      - critical-review.yaml
      - patch-trace.yaml
      - document-diff.yaml
    required_outputs:
      - knowledge-delta.yaml
      - residual-risks.yaml
      - taxonomy-risks.yaml
      - workflow-state.yaml
    allowed_writes:
      - knowledge-delta.yaml
    validators: []
  closure:
    prompt: workflows/survey/prompts/10-closure.md
    required_inputs:
      - contract.yaml
      - knowledge-delta.yaml
      - patch-trace.yaml
    required_outputs:
      - next-round-targets.yaml
    allowed_writes:
      - next-round-targets.yaml
      - round-summary.yaml
    validators:
      - cr-validate-single-mutable-document

patch_schema: workflows/survey/schemas/survey-patch.schema.json

patch_types:
  - taxonomy_revision
  - related_work_section_rewrite
  - comparison_matrix_update
  - gap_analysis_update
  - missing_source_addition
  - terminology_revision

validators:
  - cr-validate-single-mutable-document
  - cr-validate-survey-units
  - cr-validate-survey-evidence
  - cr-validate-survey-patch
  - cr-validate-document-diff
  - cr-validate-knowledge-delta

review_rubric:
  - "Are classification criteria orthogonal?"
  - "Does related work cover key systems?"
  - "Are strong baselines missing?"
  - "Do comparison dimensions lead to gaps?"
  - "Is source-backed analysis sufficient?"
  - "Does it form a taxonomy, not just a literature dump?"
