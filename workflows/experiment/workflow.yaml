# Experiment Workflow — CriticalResearch v2
# Purpose: Design, execute, and analyze experiments. Modify experiment plans
# and record results.

schema_version: "1.0.0"
workflow_id: experiment
target_document_types:
  - experiment-plan

stage_order:
  - contract
  - experiment_state
  - hypothesis_design
  - experiment_critical_review
  - experiment_execution
  - results_analysis
  - revision_plan
  - apply_experiment_patch
  - knowledge_delta
  - closure
prompt_pack:
  contract: workflows/experiment/prompts/01-contract.md
  experiment_state: workflows/experiment/prompts/02-experiment-state.md
  hypothesis_design: workflows/experiment/prompts/03-methodology-design.md
  experiment_critical_review: workflows/experiment/prompts/04-experiment-critical-review.md
  experiment_execution: workflows/experiment/prompts/05-experiment-plan.md
  results_analysis: workflows/experiment/prompts/06-results-analysis.md
  revision_plan: workflows/experiment/prompts/08-revision-plan.md
  apply_experiment_patch: workflows/experiment/prompts/07-apply-experiment-patch.md
  knowledge_delta: workflows/experiment/prompts/09-knowledge-delta.md
  closure: workflows/experiment/prompts/10-closure.md
stage_contracts:
  contract:
    prompt: workflows/experiment/prompts/01-contract.md
    required_inputs:
      - project.yaml
      - documents/registry.yaml
    required_outputs:
      - contract.yaml
    allowed_writes:
      - contract.yaml
    validators:
      - cr-validate-round-contract
  experiment_state:
    prompt: workflows/experiment/prompts/02-experiment-state.md
    required_inputs:
      - contract.yaml
    required_outputs:
      - experiment-state.yaml
    allowed_writes:
      - experiment-state.yaml
    validators: []
  hypothesis_design:
    prompt: workflows/experiment/prompts/03-methodology-design.md
    required_inputs:
      - contract.yaml
      - experiment-state.yaml
    required_outputs:
      - methodology-design.yaml
      - methodology-justification.yaml
    allowed_writes:
      - methodology-design.yaml
      - methodology-justification.yaml
    validators: []
  experiment_critical_review:
    prompt: workflows/experiment/prompts/04-experiment-critical-review.md
    required_inputs:
      - experiment-state.yaml
      - methodology-design.yaml
      - contract.yaml
    required_outputs:
      - critique-ledger.yaml
      - review-disposition.yaml
    allowed_writes:
      - critique-ledger.yaml
      - review-disposition.yaml
    validators: []
  experiment_execution:
    prompt: workflows/experiment/prompts/05-experiment-plan.md
    required_inputs:
      - methodology-design.yaml
      - critique-ledger.yaml
      - review-disposition.yaml
      - experiment-state.yaml
    required_outputs:
      - experiment-execution-plan.yaml
      - experiment-materials-checklist.yaml
    allowed_writes:
      - experiment-execution-plan.yaml
      - experiment-materials-checklist.yaml
    validators: []
  results_analysis:
    prompt: workflows/experiment/prompts/06-results-analysis.md
    required_inputs:
      - methodology-design.yaml
      - experiment-execution-plan.yaml
      - critique-ledger.yaml
      - review-disposition.yaml
      - experiment-state.yaml
    required_outputs:
      - results-analysis.yaml
      - experiment-findings.yaml
    allowed_writes:
      - results-analysis.yaml
      - experiment-findings.yaml
    validators: []
  revision_plan:
    prompt: workflows/experiment/prompts/08-revision-plan.md
    required_inputs:
      - critique-ledger.yaml
      - review-disposition.yaml
      - results-analysis.yaml
      - experiment-findings.yaml
      - methodology-design.yaml
      - experiment-execution-plan.yaml
      - contract.yaml
    required_outputs:
      - revision-plan.yaml
      - patch-plan.yaml
      - deferred-obligations.yaml
      - no-patch-rationale.yaml
    allowed_writes:
      - revision-plan.yaml
      - patch-plan.yaml
      - deferred-obligations.yaml
      - no-patch-rationale.yaml
    validators: []
  apply_experiment_patch:
    prompt: workflows/experiment/prompts/07-apply-experiment-patch.md
    required_inputs:
      - revision-plan.yaml
      - experiment-execution-plan.yaml
    required_outputs:
      - patch-trace.yaml
      - writing-diff.yaml
      - validation-obligations.yaml
    allowed_writes:
      - patch-trace.yaml
      - writing-diff.yaml
      - validation-obligations.yaml
    validators: []
  knowledge_delta:
    prompt: workflows/experiment/prompts/09-knowledge-delta.md
    required_inputs:
      - critique-ledger.yaml
      - patch-trace.yaml
      - writing-diff.yaml
    required_outputs:
      - knowledge-delta.yaml
      - knowledge-apply-log.yaml
    allowed_writes:
      - knowledge-delta.yaml
    validators: []
  closure:
    prompt: workflows/experiment/prompts/10-closure.md
    required_inputs:
      - contract.yaml
      - knowledge-delta.yaml
      - patch-trace.yaml
      - review-disposition.yaml
    required_outputs:
      - next-round-targets.yaml
      - round-summary.yaml
    allowed_writes:
      - next-round-targets.yaml
      - round-summary.yaml
    validators:
      - cr-validate-single-mutable-document

patch_schema: workflows/experiment/schemas/experiment-patch.schema.json

patch_types:
  - hypothesis_update
  - methodology_revision
  - result_recording
  - analysis_update
  - obligation_fulfillment

validators:
  - cr-validate-single-mutable-document
  - cr-validate-document-diff
  - cr-validate-knowledge-delta

review_rubric:
  - "Is the hypothesis testable?"
  - "Are baselines fair?"
  - "Are measurements reproducible?"
  - "Do results support or refute claims?"
  - "Are confounding factors controlled?"
