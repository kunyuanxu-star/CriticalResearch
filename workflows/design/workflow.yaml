# Design Workflow — CriticalResearch v2
# Purpose: Modify design documents — architecture, components, invariants,
# interfaces, lifecycle models, failure models.

schema_version: "1.0.0"
workflow_id: design
target_document_types:
  - design-doc

stage_order:
  - contract
  - design_state
  - evidence_grounding
  - design_critical_review
  - invariant_interface_strategy
  - revision_plan
  - apply_design_patch
  - implementation_obligations
  - knowledge_delta
  - closure

prompt_pack:
  contract: workflows/design/prompts/01-contract.md
  design_state: workflows/design/prompts/02-design-state.md
  evidence_grounding: workflows/design/prompts/03-evidence-grounding.md
  design_critical_review: workflows/design/prompts/04-design-critical-review.md
  invariant_interface_strategy: workflows/design/prompts/05-invariant-interface-strategy.md
  revision_plan: workflows/design/prompts/06-revision-plan.md
  apply_design_patch: workflows/design/prompts/07-apply-design-patch.md
  implementation_obligations: workflows/design/prompts/08-implementation-obligations.md
  knowledge_delta: workflows/design/prompts/09-knowledge-delta.md
  closure: workflows/design/prompts/10-closure.md
stage_contracts:
  contract:
    prompt: workflows/design/prompts/01-contract.md
    required_inputs:
      - project.yaml
      - documents/registry.yaml
    required_outputs:
      - contract.yaml
    allowed_writes:
      - contract.yaml
    validators:
      - cr-validate-round-contract
  design_state:
    prompt: workflows/design/prompts/02-design-state.md
    required_inputs:
      - contract.yaml
    required_outputs:
      - design-state.yaml
    allowed_writes:
      - design-state.yaml
    validators: []
  evidence_grounding:
    prompt: workflows/design/prompts/03-evidence-grounding.md
    required_inputs:
      - design-state.yaml
      - contract.yaml
    required_outputs:
      - evidence-grounding.yaml
    allowed_writes:
      - evidence-grounding.yaml
    validators: []
  design_critical_review:
    prompt: workflows/design/prompts/04-design-critical-review.md
    required_inputs:
      - design-state.yaml
      - evidence-grounding.yaml
    required_outputs:
      - critical-review.yaml
    allowed_writes:
      - critical-review.yaml
    validators: []
  invariant_interface_strategy:
    prompt: workflows/design/prompts/05-invariant-interface-strategy.md
    required_inputs:
      - critical-review.yaml
      - design-state.yaml
      - evidence-grounding.yaml
    required_outputs:
      - invariant-interface-strategy.yaml
    allowed_writes:
      - invariant-interface-strategy.yaml
    validators: []
  revision_plan:
    prompt: workflows/design/prompts/06-revision-plan.md
    required_inputs:
      - critical-review.yaml
      - invariant-interface-strategy.yaml
      - contract.yaml
    required_outputs:
      - revision-plan.yaml
      - patch-plan.yaml
    allowed_writes:
      - revision-plan.yaml
      - patch-plan.yaml
      - deferred-obligations.yaml
      - no-patch-rationale.yaml
    validators: []
  apply_design_patch:
    prompt: workflows/design/prompts/07-apply-design-patch.md
    required_inputs:
      - revision-plan.yaml
      - design-state.yaml
    required_outputs:
      - patch-trace.yaml
      - document-diff.yaml
    allowed_writes:
      - patch-trace.yaml
      - document-diff.yaml
    validators: []
  implementation_obligations:
    prompt: workflows/design/prompts/08-implementation-obligations.md
    required_inputs:
      - critical-review.yaml
      - patch-trace.yaml
      - contract.yaml
    required_outputs:
      - implementation-obligations.yaml
    allowed_writes:
      - implementation-obligations.yaml
    validators: []
  knowledge_delta:
    prompt: workflows/design/prompts/09-knowledge-delta.md
    required_inputs:
      - critical-review.yaml
      - patch-trace.yaml
      - document-diff.yaml
    required_outputs:
      - knowledge-delta.yaml
    allowed_writes:
      - knowledge-delta.yaml
    validators: []
  closure:
    prompt: workflows/design/prompts/10-closure.md
    required_inputs:
      - contract.yaml
      - knowledge-delta.yaml
      - patch-trace.yaml
    required_outputs:
      - next-round-targets.yaml
    allowed_writes:
      - next-round-targets.yaml
      - round-summary.yaml
    validators:
      - cr-validate-single-mutable-document

patch_schema: workflows/design/schemas/design-patch.schema.json

patch_types:
  - architecture_revision
  - component_boundary_update
  - invariant_revision
  - interface_contract_update
  - lifecycle_model_update
  - failure_model_update
  - implementation_obligation

validators:
  - cr-validate-single-mutable-document
  - cr-validate-design-units
  - cr-validate-invariants
  - cr-validate-interface-contracts
  - cr-validate-design-patch
  - cr-validate-document-diff

review_rubric:
  - "Are design goals explicit?"
  - "Are interface semantics stable?"
  - "Are invariants enforceable?"
  - "Is authority/ownership/lifecycle clear?"
  - "Are failure cases covered?"
  - "Is there implementation infeasibility?"
