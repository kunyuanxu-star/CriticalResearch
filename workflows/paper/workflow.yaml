# Paper Workflow — CriticalResearch v2
# Purpose: Modify paper — sections, claims, argument flow, writing quality, positioning.
# This workflow replaces the monolithic 37-phase v1 paper mode.

schema_version: "1.0.0"
workflow_id: paper
target_document_types:
  - paper

prompt_pack:
  contract: workflows/paper/prompts/01-contract.md
  paper_state: workflows/paper/prompts/02-paper-state.md
  claim_evidence_grounding: workflows/paper/prompts/03-claim-evidence-grounding.md
  reviewer_critique: workflows/paper/prompts/04-reviewer-critique.md
  writing_strategy: workflows/paper/prompts/05-writing-strategy.md
  revision_plan: workflows/paper/prompts/06-revision-plan.md
  apply_paper_patch: workflows/paper/prompts/07-apply-paper-patch.md
  claim_alignment: workflows/paper/prompts/08-claim-alignment.md
  knowledge_delta: workflows/paper/prompts/09-knowledge-delta.md
  closure: workflows/paper/prompts/10-closure.md
stage_contracts:
  contract:
    prompt: workflows/paper/prompts/01-contract.md
    required_inputs:
      - project.yaml
      - documents/registry.yaml
    required_outputs:
      - contract.yaml
    allowed_writes:
      - contract.yaml
    validators:
      - cr-validate-round-contract
  paper_state:
    prompt: workflows/paper/prompts/02-paper-state.md
    required_inputs:
      - contract.yaml
    required_outputs:
      - paper-state.yaml
    allowed_writes:
      - paper-state.yaml
    validators:
      - cr-validate-paper-units
  claim_evidence_grounding:
    prompt: workflows/paper/prompts/03-claim-evidence-grounding.md
    required_inputs:
      - paper-state.yaml
      - contract.yaml
    required_outputs:
      - evaluation-obligations.yaml
      - exemplar-paper-analysis.yaml
      - osdi-sosp-reviewer-risk.yaml
      - claim-evidence-grounding.yaml
      - venue-norm-ledger.yaml


    allowed_writes:
      - claim-evidence-grounding.yaml
    validators:
      - cr-validate-claim-evidence
  reviewer_critique:
    prompt: workflows/paper/prompts/04-reviewer-critique.md
    required_inputs:
      - paper-state.yaml
      - claim-evidence-grounding.yaml
    required_outputs:
      - critical-review.yaml
    allowed_writes:
      - critical-review.yaml
    validators: []
  writing_strategy:
    prompt: workflows/paper/prompts/05-writing-strategy.md
    required_inputs:
      - critical-review.yaml
      - paper-state.yaml
      - claim-evidence-grounding.yaml
    required_outputs:
      - exemplar-paper-analysis.yaml
      - paragraph-logic-audit.yaml
      - sentence-level-audit.yaml
      - venue-norm-ledger.yaml
      - writing-strategy.yaml
      - word-choice-audit.yaml


    allowed_writes:
      - writing-strategy.yaml
    validators: []
  revision_plan:
    prompt: workflows/paper/prompts/06-revision-plan.md
    required_inputs:
      - critical-review.yaml
      - writing-strategy.yaml
      - contract.yaml
    required_outputs:
      - revision-plan.yaml
      - deferred-obligations.yaml
      - evaluation-obligations.yaml
      - no-patch-rationale.yaml
      - patch-plan.yaml
      - osdi-sosp-reviewer-risk.yaml


    allowed_writes:
      - revision-plan.yaml
      - patch-plan.yaml
    validators: []
  apply_paper_patch:
    prompt: workflows/paper/prompts/07-apply-paper-patch.md
    required_inputs:
      - revision-plan.yaml
      - contract.yaml
    required_outputs:
      - patch-trace.yaml
      - deferred-obligations.yaml
      - evaluation-obligations.yaml
      - no-patch-rationale.yaml
      - document-diff.yaml
      - residual-risks.yaml


    allowed_writes:
      - patch-trace.yaml
      - document-diff.yaml
    validators:
      - cr-validate-paper-patch
      - cr-validate-writing-diff
  claim_alignment:
    prompt: workflows/paper/prompts/08-claim-alignment.md
    required_inputs:
      - claim-evidence-grounding.yaml
      - patch-trace.yaml
      - document-diff.yaml
    required_outputs:
      - claim-alignment.yaml
      - residual-risks.yaml
    allowed_writes:
      - claim-alignment.yaml
    validators:
      - cr-validate-paper-claims
      - cr-validate-paper-evidence-alignment
  knowledge_delta:
    prompt: workflows/paper/prompts/09-knowledge-delta.md
    required_inputs:
      - critical-review.yaml
      - patch-trace.yaml
      - document-diff.yaml
    required_outputs:
      - knowledge-delta.yaml
      - residual-risks.yaml
      - reviewer-rejection-paths.yaml
      - workflow-state.yaml
      - writing-risk-audit.yaml
    allowed_writes:
      - knowledge-delta.yaml
    validators: []
  closure:
    prompt: workflows/paper/prompts/10-closure.md
    required_inputs:
      - contract.yaml
      - patch-trace.yaml
      - document-diff.yaml
      - knowledge-delta.yaml
    required_outputs:
      - next-round-targets.yaml
      - workflow-state.yaml
    allowed_writes:
      - next-round-targets.yaml
    validators:
      - cr-validate-single-mutable-document
      - cr-validate-paper-patch
      - cr-validate-writing-diff
      - cr-validate-paper-claims
      - cr-validate-paper-evidence-alignment
stage_order:
  - contract
  - paper_state
  - claim_evidence_grounding
  - reviewer_critique
  - writing_strategy
  - revision_plan
  - apply_paper_patch
  - claim_alignment
  - knowledge_delta
  - closure

patch_schema: workflows/paper/schemas/paper-patch.schema.json

patch_types:
  - paragraph_rewrite
  - section_restructure
  - claim_weakening
  - claim_strengthening
  - related_work_repositioning
  - evaluation_obligation_addition
  - contribution_rewrite

validators:
  - cr-validate-single-mutable-document
  - cr-validate-paper-units
  - cr-validate-claim-evidence
  - cr-validate-paper-patch
  - cr-validate-writing-diff

review_rubric:
  - "Is motivation strong?"
  - "Is root cause clearly identified?"
  - "Is insight non-trivial?"
  - "Are claims defensible?"
  - "Are baselines dangerous enough?"
  - "Does the argument chain advance linearly?"
  - "Does writing match top-venue style?"
