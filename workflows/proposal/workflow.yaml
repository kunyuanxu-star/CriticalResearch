# Proposal Workflow — CriticalResearch v2
# Purpose: Modify proposal — problem statement, research questions,
# technical approach, risks, milestones.

schema_version: "1.0.0"
workflow_id: proposal
target_document_types:
  - proposal

stage_order:
  - contract
  - problem_state
  - feasibility_research
  - proposal_critical_review
  - scope_strategy
  - apply_proposal_patch
  - knowledge_delta
  - closure
prompt_pack:
  contract: workflows/proposal/prompts/01-contract.md
  problem_state: workflows/proposal/prompts/02-proposal-state.md
  feasibility_research: workflows/proposal/prompts/03-feasibility-research.md
  proposal_critical_review: workflows/proposal/prompts/04-proposal-critical-review.md
  scope_strategy: workflows/proposal/prompts/05-scope-strategy.md
  apply_proposal_patch: workflows/proposal/prompts/07-apply-proposal-patch.md
  knowledge_delta: workflows/proposal/prompts/09-knowledge-delta.md
  closure: workflows/proposal/prompts/10-closure.md


patch_schema: workflows/proposal/schemas/proposal-patch.schema.json

patch_types:
  - problem_reframing
  - research_question_revision
  - scope_narrowing
  - contribution_rewrite
  - technical_route_update
  - risk_register_update
  - milestone_update

validators:
  - cr-validate-single-mutable-document
  - cr-validate-proposal-problem
  - cr-validate-proposal-scope
  - cr-validate-proposal-risk
  - cr-validate-document-diff

review_rubric:
  - "Is the problem real?"
  - "Is scope controllable?"
  - "Are research questions clear?"
  - "Do contributions look like research contributions?"
  - "Is the technical route credible?"
  - "Are risks identified?"
  - "Are milestones executable?"
