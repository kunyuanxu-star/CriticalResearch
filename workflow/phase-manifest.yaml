# Phase Manifest — Single source of truth for the 37-phase strict paper workflow.
# All other files (templates, schemas, validators, prompts, tests) must be
# consistent with this manifest. Checked by cr-validate-phase-manifest-consistency.
phase_count: 37
close_round_is_phase: true
execution_policy:
  full_round_required: true
  full_paper_required: true
  required_phase_count: 37
  allow_partial_stop: false
  stop_only_on:
    - round_closed
    - human_decision_required
    - unrecoverable_tool_error

