schema_version: 1.0.0
stage_count: 8
close_round_is_stage: true
execution_policy:
  full_round_required: true
  full_paper_required: true
  required_stage_count: 8
  allow_partial_stop: false
  stop_only_on:
  - round_closed
  - human_decision_required
  - unrecoverable_tool_error
stages:
- order: 1
  id: s1_round_contract
  prompt: prompts/core/s1_round_contract.md
  dependencies: []
  required_inputs:
  - path: project:documents/paper.md
    type: markdown
  - path: project:state/claim-ledger.yaml
    type: yaml
  required_outputs:
  - path: round:round-contract.yaml
    type: yaml
    schema: schemas/round-contract.schema.json
  allowed_write_scopes:
  - round:round-contract.yaml
  forbidden_actions:
  - external_research
  - write_paper_patch
  - edit_draft
  - generate_critique
  objective_binding_required: true
  full_paper_coverage_required: true
  external_review_required: false
  state_required: running
  no_op_allowed: false
- order: 2
  id: s2_evidence_grounding
  prompt: prompts/core/s2_evidence_grounding.md
  dependencies:
  - s1_round_contract
  required_inputs:
  - path: round:round-contract.yaml
    type: yaml
  - path: project:documents/paper.md
    type: markdown
  - path: project:state/claim-ledger.yaml
    type: yaml
  required_outputs:
  - path: round:evidence-ledger.yaml
    type: yaml
    schema: schemas/evidence-ledger.schema.json
  - path: round:claim-evidence-map.yaml
    type: yaml
    schema: schemas/claim-evidence-map.schema.json
  - path: round:search-log.yaml
    type: yaml
    schema: schemas/search-log.schema.json
  - path: round:raw-sources/
    type: directory
  allowed_write_scopes:
  - round:evidence-ledger.yaml
  - round:claim-evidence-map.yaml
  - round:search-log.yaml
  - round:raw-sources/
  forbidden_actions:
  - generate_critique
  - edit_draft
  - generate_patch
  - write_paper_patch
  objective_binding_required: true
  full_paper_coverage_required: false
  external_review_required: false
  state_required: running
  no_op_allowed: false
  coverage_exemption_reason_required: true
- order: 3
  id: s3_critical_review
  prompt: prompts/core/s3_critical_review.md
  dependencies:
  - s2_evidence_grounding
  required_inputs:
  - path: round:evidence-ledger.yaml
    type: yaml
  - path: round:claim-evidence-map.yaml
    type: yaml
  - path: project:documents/paper.md
    type: markdown
  - path: round:round-contract.yaml
    type: yaml
  required_outputs:
  - path: round:critique-ledger.yaml
    type: yaml
    schema: schemas/critique-ledger.schema.json
  - path: round:review-disposition.yaml
    type: yaml
    schema: schemas/review-disposition.schema.json
  allowed_write_scopes:
  - round:critique-ledger.yaml
  - round:review-disposition.yaml
  forbidden_actions:
  - edit_draft
  - generate_patch
  - apply_patch
  objective_binding_required: true
  full_paper_coverage_required: true
  external_review_required: false
  state_required: running
  no_op_allowed: false
- order: 4
  id: s4_revision_strategy
  prompt: prompts/core/s4_revision_strategy.md
  dependencies:
  - s3_critical_review
  required_inputs:
  - path: round:critique-ledger.yaml
    type: yaml
  - path: round:review-disposition.yaml
    type: yaml
  required_outputs:
  - path: round:revision-plan.yaml
    type: yaml
    schema: schemas/revision-plan.schema.json
  allowed_write_scopes:
  - round:revision-plan.yaml
  forbidden_actions:
  - edit_draft
  - generate_patch
  - apply_patch
  objective_binding_required: true
  full_paper_coverage_required: true
  external_review_required: false
  state_required: running
  no_op_allowed: true
- order: 5
  id: s5_writing_strategy
  prompt: prompts/core/s5_writing_strategy.md
  dependencies:
  - s4_revision_strategy
  required_inputs:
  - path: round:revision-plan.yaml
    type: yaml
  - path: project:documents/paper.md
    type: markdown
  required_outputs:
  - path: round:writing-plan.yaml
    type: yaml
    schema: schemas/writing-plan.schema.json
  - path: round:patch-plan.yaml
    type: yaml
    schema: schemas/patch-plan.schema.json
  allowed_write_scopes:
  - round:writing-plan.yaml
  - round:patch-plan.yaml
  forbidden_actions:
  - edit_draft
  - apply_patch
  objective_binding_required: true
  full_paper_coverage_required: true
  external_review_required: false
  state_required: running
  no_op_allowed: true
- order: 6
  id: s6_paper_patch
  prompt: prompts/core/s6_paper_patch.md
  dependencies:
  - s5_writing_strategy
  required_inputs:
  - path: round:patch-plan.yaml
    type: yaml
  - path: round:writing-plan.yaml
    type: yaml
  - path: project:documents/paper.md
    type: markdown
  required_outputs:
  - path: project:documents/paper.md
    type: markdown
    no_schema_reason: "Markdown paper draft has no JSON schema."
  - path: round:writing-diff.yaml
    type: yaml
    schema: schemas/writing-diff.schema.json
  - path: round:patch-trace.yaml
    type: yaml
    schema: schemas/patch-trace.schema.json
  - path: round:experiment-obligations.yaml
    type: yaml
    schema: schemas/experiment-obligations.schema.json
  allowed_write_scopes:
  - project:documents/paper.md
  - round:writing-diff.yaml
  - round:patch-trace.yaml
  - round:experiment-obligations.yaml
  forbidden_actions:
  - add_new_evidence
  - change_unpatched_sections
  - generate_critique
  objective_binding_required: true
  full_paper_coverage_required: true
  external_review_required: false
  state_required: running
  no_op_allowed: true
- order: 7
  id: s7_knowledge_consolidation
  prompt: prompts/core/s7_knowledge_consolidation.md
  dependencies:
  - s6_paper_patch
  required_inputs:
  - path: round:critique-ledger.yaml
    type: yaml
  - path: round:patch-trace.yaml
    type: yaml
  - path: round:evidence-ledger.yaml
    type: yaml
  required_outputs:
  - path: round:knowledge-delta.yaml
    type: yaml
    schema: schemas/knowledge-delta.schema.json
  - path: round:knowledge-apply-log.yaml
    type: yaml
    schema: schemas/knowledge-apply-log.schema.json
  allowed_write_scopes:
  - round:knowledge-delta.yaml
  - round:knowledge-apply-log.yaml
  forbidden_actions:
  - edit_draft
  - generate_patch
  - modify_claim_ledger
  objective_binding_required: true
  full_paper_coverage_required: false
  external_review_required: false
  state_required: running
  no_op_allowed: true
  coverage_exemption_reason_required: true
- order: 8
  id: s8_round_closure
  prompt: prompts/core/s8_round_closure.md
  dependencies:
  - s7_knowledge_consolidation
  required_inputs:
  - path: round:knowledge-delta.yaml
    type: yaml
  - path: round:experiment-obligations.yaml
    type: yaml
  - path: round:review-disposition.yaml
    type: yaml
  required_outputs:
  - path: round:next-round-targets.yaml
    type: yaml
    schema: schemas/next-round-targets.schema.json
  - path: round:round-summary.yaml
    type: yaml
  allowed_write_scopes:
  - round:next-round-targets.yaml
  - round:round-summary.yaml
  forbidden_actions:
  - edit_draft
  - generate_patch
  - modify_artifacts
  objective_binding_required: true
  full_paper_coverage_required: true
  external_review_required: false
  state_required: running
  no_op_allowed: false
